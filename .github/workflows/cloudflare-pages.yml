name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'nebula-catcher-web-game' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME variable" && exit 1)

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create Cloudflare Pages project if needed
        run: npx wrangler@latest pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main --commit-dirty=true
