<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Nebula Catcher architecture</title>
  <desc id="desc">Development, CI, static build, GitHub Pages, and Cloudflare Pages deployment flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#070a1f"/><stop offset="0.55" stop-color="#14204f"/><stop offset="1" stop-color="#31104e"/></linearGradient>
    <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#13245f"/><stop offset="1" stop-color="#1d3b77"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#70f5ff"/></marker>
  </defs>
  <rect width="1100" height="620" rx="34" fill="url(#bg)"/>
  <text x="60" y="70" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Nebula Catcher: Web App Architecture</text>
  <text x="60" y="105" fill="#c7d2ff" font-family="Inter, Arial, sans-serif" font-size="17">Static Canvas game with automated test, build, artifact, GitHub Pages, and Cloudflare Pages deployment paths.</text>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="65" y="170" width="210" height="110" rx="22" fill="url(#card)" stroke="#70f5ff" stroke-opacity="0.55"/><text x="92" y="212" fill="#70f5ff" font-size="15" font-weight="800">Browser</text><text x="92" y="244" fill="#fff" font-size="23" font-weight="800">Player Input</text><text x="92" y="268" fill="#c7d2ff" font-size="14">Keyboard / touch / pointer</text>
    <rect x="345" y="170" width="230" height="110" rx="22" fill="url(#card)" stroke="#ffe66d" stroke-opacity="0.55"/><text x="374" y="212" fill="#ffe66d" font-size="15" font-weight="800">Vite App</text><text x="374" y="244" fill="#fff" font-size="23" font-weight="800">Canvas Game</text><text x="374" y="268" fill="#c7d2ff" font-size="14">main.js + gameLogic.js</text>
    <rect x="650" y="170" width="205" height="110" rx="22" fill="url(#card)" stroke="#ff7a45" stroke-opacity="0.55"/><text x="678" y="212" fill="#ffb089" font-size="15" font-weight="800">Build Output</text><text x="678" y="244" fill="#fff" font-size="23" font-weight="800">dist/</text><text x="678" y="268" fill="#c7d2ff" font-size="14">HTML / JS / CSS assets</text>
    <rect x="160" y="390" width="225" height="110" rx="22" fill="url(#card)" stroke="#70f5ff" stroke-opacity="0.55"/><text x="190" y="432" fill="#70f5ff" font-size="15" font-weight="800">GitHub Actions</text><text x="190" y="464" fill="#fff" font-size="23" font-weight="800">CI</text><text x="190" y="488" fill="#c7d2ff" font-size="14">Lint / Vitest / Build / Artifact</text>
    <rect x="455" y="390" width="225" height="110" rx="22" fill="url(#card)" stroke="#ffe66d" stroke-opacity="0.55"/><text x="485" y="432" fill="#ffe66d" font-size="15" font-weight="800">Public URL</text><text x="485" y="464" fill="#fff" font-size="23" font-weight="800">GitHub Pages</text><text x="485" y="488" fill="#c7d2ff" font-size="14">deploy-pages workflow</text>
    <rect x="750" y="390" width="225" height="110" rx="22" fill="url(#card)" stroke="#ff7a45" stroke-opacity="0.55"/><text x="780" y="432" fill="#ffb089" font-size="15" font-weight="800">Custom Domain</text><text x="780" y="464" fill="#fff" font-size="23" font-weight="800">Cloudflare Pages</text><text x="780" y="488" fill="#c7d2ff" font-size="14">wrangler direct upload</text>
  </g>
  <g stroke="#70f5ff" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"><line x1="275" y1="225" x2="335" y2="225"/><line x1="575" y1="225" x2="640" y2="225"/><path d="M755 280 C730 330 655 350 590 385" fill="none"/><path d="M740 280 C765 335 825 350 855 385" fill="none"/><path d="M465 280 C420 330 340 350 280 385" fill="none"/></g>
</svg>
